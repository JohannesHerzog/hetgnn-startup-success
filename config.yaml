paths:
  data_dir: data
  crunchbase_dir: data/crunchbase
  graph_dir: data/graph
  other_dir: data/other

visualize:
  enabled: false
  output_file: outputs/graph.html
  visible_node_types: ["startup", "founder", "investor", "sector", "city", "university"]
  show_labels: true
  enable_physics: true
  max_nodes: 30
  sample_method: "random"  # "random", "degree_based", or "connected_component"
  show_features: true  # Display node features in tooltips
  max_features: 10     # Maximum number of features to show per node
  use_masks: true      # Only include nodes from train/val/test masks
  included_masks: ["val"] #, "val", "test"]  # Which masks to include
  feature_visualization: false
  edge_visualization: true

seed: 42

wandb:
  enabled: false
  project: gnn-startup-success
  tags: ["GNN", "hetero", "startup-success-prediction"]
  use_sweep: false
  sweep_config_path: sweep.yaml

# Analysis
analysis:
  enable_homophily_analysis: true
  enable_downstream_analysis: true

# Features
features:
  use_non_target_metapaths: true # Enable context-rich metapaths (Startup -> Investor -> City, etc.)

# Metapath Discovery Configuration
metapath_discovery:
  mode: "none"  # Options: "none", "manual", "automatic", "hybrid"
  
  # Automatic discovery settings (brute-force enumeration)
  automatic:
    max_hops: 3  # Maximum metapath length (2-3 recommended, 4+ = memory intensive)
    min_edges: 1000  # Filter out sparse metapaths (Increased to 1000 for quality/memory)
    target_node: "startup"  # Node type to discover paths to
    
    # Pruning options to reduce metapath count
    prune_self_loops: true  # Remove A->B->A when direct A->A exists
    prune_redundant: true  # Remove redundant compositions
    prune_top_k: 10 # IMPORTANT: Keep only Top-K neighbors per node (10 * 100k nodes = ~1M edges max)
    exclude_node_types: ["city", "sector"] # Exclude paths through these high-degree "hub" nodes (prevents OOM)
    max_metapaths: 30  # Cap total metapaths (Reduced to 30 for Safety)
    selection_strategy: "least_edges" # Prioritize specific/rare paths (high signal) over dense/generic ones

    # Materialization method
    materialize_method: "random_walk"  # "composition" (matrix mult) or "random_walk"

  # Manual discovery settings (existing behavior)
  manual:
    use_existing_definitions: true  # Use manually defined metapaths from code
    whitelist:  # 15 curated metapaths (empty = use all)
      # Investment co-participation (stage-split: homophily drops early→late)
      - early_portfolio_siblings
      - mid_portfolio_siblings
      - late_portfolio_siblings
      # Alumni networks (founder paths strongly homophilic, h=0.815)
      - alumni_network
      - early_alumni_investor_network
      - late_alumni_investor_network
      # VC employment (founder worked at investor firm)
      - early_founder_vc_employment
      - mid_founder_vc_employment
      - late_founder_vc_employment
      # Board governance interlocks
      - early_board_director_network
      - mid_board_director_network
      - late_board_director_network
      # Peer similarity
      - sector_peers
      - city_peers
      # Investor alumni (reverse direction)
      - early_investor_alumni
    
  # Hybrid mode (combine manual + automatic)
  hybrid:
    use_manual: true  # Include manual metapaths
    add_automatic: true  # Add automatic metapaths
    automatic_max_hops: 2  # Shorter hops for hybrid to limit total count

train:
  use_gnn: true
  model: SeHGNN # Switch back to SeHGNN to train embeddings
  device: cuda # "cpu" or "cuda" (falls back to CPU if not available)
  lr: 0.01
  weight_decay: 0.0006
  epochs: 100
  aggregation_method: max
  gradient_clip_val: 1.7

  # Learning Rate Scheduler Configuration
  scheduler:
    type: CosineAnnealingLR  # Options: "ReduceLROnPlateau", "CosineAnnealingLR", "None"
    
    # ReduceLROnPlateau specific settings
    mode: max              # "max" for metrics that should be maximized (e.g., AUC-ROC), "min" for loss
    factor: 0.7           # Factor by which LR is reduced (new_lr = lr * factor)
    patience: 10          # Number of epochs with no improvement after which LR is reduced
    min_lr: 1e-4          # Minimum learning rate (was too low at 1e-6)
    verbose: true         # Print when LR is reduced
    threshold: 0.001      # Minimum improvement considered as significant (for AUC: 0.001-0.01)
    threshold_mode: abs   # "abs" for absolute improvement, "rel" for relative
    
    # CosineAnnealingLR specific settings
    T_max: 100           # Period of the cosine annealing (typically number of epochs)
    eta_min: 1e-4        # Minimum learning rate for cosine annealing
    warmup_epochs: 10    # Linear warmup epochs (0 = disabled)

  loss:
    binary_loss_weight: 0.5 # for multi_task balancing of binary vs. multi_prediction
    momentum_weight: 1.0    # Weight for Momentum (Funding) task in Masked Multi-Task
    liquidity_weight: 0.1   # Weight for Liquidity (Exit) task
    retrieval_weight: 0.0  # Weight for Retrieval (disabled)
    retrieval_loss_type: "contrastive"  # Options: "distillation" (cosine similarity to text), "contrastive" (triplet loss), "arcface"
    arcface:
      margin: 0.7           # Angular margin (m) - Increased
      scale: 64.0           # Feature scale (s)
      class_column: "industry_groups" # Column to use for class labels (Sector by default, adaptable for clusters)
    
    # Contrastive Config (Stage-Hardened)
    contrastive_positive_source: "label" # 'text' (Unsupervised) or 'label' (Supervised/Implicit Stage-Hardening)
    contrastive_margin: 0.5  # Margin for TripletMarginLoss (Reverted to 0.5)
    contrastive_negatives_per_anchor: 4  # Number of negative samples per anchor
    diversity_weight: 0.0   # Weight for Diversity Regularization (encourages diverse embeddings)
    use_class_weights: true # automatic weight calculation based on class distribution
    use_focal_loss: false # Use focal loss for severe class imbalance (Global flag, Masked mode uses it specifically for Liquidity)
    focal_alpha: 0.25
    focal_gamma: 2.0 # Focusing parameter (higher = more focus on hard examples)
    status_change_weight: 1.0
    label_smoothing: 0.05

models:
  GAT:
    in_channels: -1
    hidden_channels: 64
    out_channels: 2
    num_layers: 2
    v2: true
    normalize: true  # Use BatchNorm
    activation_type: prelu
    jumping_knowledge: "cat"
    add_self_loops: false
    dropout: 0.0
    heads: 4
    negative_slope: 0.2

  GCN:
    in_channels: -1
    hidden_channels: 64
    out_channels: 2
    num_layers: 2
    normalize: true
    activation_type: prelu
    jumping_knowledge: "cat"
    dropout: 0.0
    add_self_loops: false

  MLP:
    hidden_channels: 64
    num_layers: 2
    dropout: 0.0
    activation_type: prelu
    normalize: true

  XGBoost:
    n_estimators: 200
    max_depth: 3
    learning_rate: 0.05
    subsample: 0.6
    colsample_bytree: 0.6
    gamma: 5
    reg_alpha: 5
    reg_lambda: 10
    min_child_weight: 5
    scale_pos_weight: 7.6
    objective: "binary:logistic"
    tree_method: "hist"
    
  SageGNN:
    hidden_channels: 64
    num_layers: 2
    activation_type: relu
    normalize: true
    dropout: 0.3
    
  HAN:
    in_channels: -1  # Automatically inferred
    hidden_channels: 64
    num_layers: 1
    heads: 4
    negative_slope: 0.14  # LeakyReLU negative slope
    dropout: 0.24  # Dropout rate
    activation_type: prelu  # Can be "relu" or "prelu"

  SeHGNN:
    in_channels: -1
    hidden_channels: 128
    num_layers: 2
    heads: 8
    dropout: 0.15
    input_drop: 0.35
    att_drop: 0.3
    activation_type: leaky_relu
    use_residual: true
    transformer_activation: "relu"
    use_self_loop: true
    attention_temperature: 1
    gamma_init: 0.0       # Transformer gamma init (0.0 = paper default)
    gamma_learnable: true  # Whether gamma is a learnable parameter
    channel_masking: true  # Mask empty metapath channels in transformer attention
    use_layer_norm: true   # LayerNorm before fc_after_concat

    # Retrieval projection head (SimCLR/CLIP pattern) - decouples retrieval from classification
    use_retrieval_head: true  # Enable separate retrieval projection
    detach_retrieval_head: false # Gradient Stop: Enabled (Protects main task)
    retrieval_projection:
      hidden_dim: 128         # Intermediate dimension (like SimCLR: 2048→128)
      output_dim: 64          # Final retrieval embedding dim
      dropout: 0.0            # Dropout for regularization
      use_batch_norm: true    # BatchNorm after projection
      activation: "relu"      # Activation function

  LLM:
    huggingface_token: ""  # Paste your HuggingFace token here (required for gated models)
    model_name: "meta-llama/Meta-Llama-3-8B-Instruct"  # Knowledge cutoff: March 2023 (prevents leakage)
    temperature: 0.0                # 0.0 for deterministic predictions (recommended: < 0.1)
    cache_dir: "outputs/llm_cache"  # Directory to cache predictions
    device: "auto"                  # "auto", "cuda", "cpu"
    torch_dtype: "auto"             # "auto", "float16", "bfloat16", "float32"
    load_in_8bit: false             # 8-bit quantization (requires bitsandbytes)
    load_in_4bit: false             # 4-bit quantization (requires bitsandbytes)
    use_calibration: true           # Enable base-rate anchoring in prompts (true=calibrated, false=uncalibrated)
    use_chain_of_thought: false     # Enable chain-of-thought reasoning before probability (slower but may be more accurate)
    prompt_features: "full"         # "full", "description_only", "features_only", "name_only", "name_and_features", "name_and_description"

eval:
  export_predictions: true # Export test predictions to CSV
  export_metrics_json: true # Export evaluation metrics as JSON to outputs/results/
  case_study_uuid: "5b8450df-dfb5-4d47-9168-4918c1aba3ac" # Voize
  test_best_model: true  # Enable best model testing
  optimization_metric_type: auc_pr
  min_amount_of_epochs: 40
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.00005  # Minimum change to qualify as improvement

explain:
  sampling_method: 'stratified' # 'random' or 'stratified'
  enabled: true
  path: outputs/explanations
  sample_size: 100
  method: {attribution_method: "IntegratedGradients"} # Saliency or IntegratedGradients

calibration:
  enabled: true
  method: platt  # 'platt' or 'isotonic'
  apply_to_test: true
  save_plots: false
  plot_dir: outputs
  n_bins: 20  # Number of bins for reliability diagrams
  optimize_threshold: true  # Find optimal threshold on validation set
  threshold_metric: f1  # Metric to optimize threshold for: 'f1', 'precision', 'recall', 'accuracy'

data_processing:
  start_date: "2014-01-01"
  end_date: "2025-12-31"
  ablation:
      drop_edges: [] # List of edge relation names to drop (e.g. ["worked_with", "funded_by"])
      drop_node_types: [] # List of node types to drop (e.g. ["investor"])
      drop_feature_groups: [] # List of feature groups to drop (e.g. ["team", "funding_rounds"])
      feature_information_level: null # null = full features, "intrinsic" = only entity-intrinsic features (no relational/graph)
  nan_filtering:
    enabled: true
    alphas:
      ipo: 0.95
      acquired: 0.95
      closed: 0.90
      operating: 0.90
      funded: 0.80
      not_funded: 0.80
  target_mode: 'masked_multi_task' # Can be 'multi_prediction', 'binary_prediction', 'multi_task', 'multi_label', or 'masked_multi_task'
  multi_column: future_status
  binary_column: acq_ipo_funding # new_funding_round or t_acq_ipo_seriesA or acq_ipo_funding
  # Multi-label configuration
  multi_label:
    columns:
      funding: new_funding_round
      acquisition: new_acquired
      ipo: new_ipo
    loss_weights:
      funding: 1.0
      acquisition: 1.0
      ipo: 1.0
    combined_metric_weights:
      funding: 0.34
      acquisition: 0.33
      ipo: 0.33
  remove_operating: false
  keep_dc_status: true
  use_org_description: true
  use_people_description: false
  visualize_embeddings: false
  description_embedding_dim: 64
  use_centrality_features: false
  use_degree_centrality: true
  use_pagerank_centrality: true
  use_edge_counts: false
  use_smart_money_features: false
  structural_only: false
  strict_gating:
    enabled: true
    # 1. Big Dogs (Late Stage or Huge Funding)
    late_stage_funding_threshold: 15000000 # 15M
    
    # 2. Scale Ops (Headcount)
    employee_count_threshold: 3 # 51+ employees
    
    # 3. Efficient Compounders (Age + Moderate Funding)
    compounder_age_threshold: 5
    compounder_funding_threshold: 3000000 # 3M4

  edge_loading:
    founder_investor_employment: true
    founder_coworking: false
    founder_investor_identity: true
    founder_co_study: false
    founder_role_edges: true
    founder_similarity: false
    startup_similarity: false

  startup_similarity:
    enabled: false
    threshold: 0.50
    metric: "tfidf" # "tfidf", "rank", or "sbert" (CSV now uses S-BERT cosine similarity)
  founder_similarity:
    enabled: false
    co_study_enabled: false
    threshold: 0.99
    metric: "tfidf" # "tfidf" or "rank"
  role_edges_enabled: true # Enable Board/Director edges
  use_louvain_clusters: true
  louvain_resolution: 0.25
  louvain_projection_types: ["investor", "city", "founder"]  # subset of: investor, city, founder, sector
  add_metapaths: true
  add_self_loops: true

  resample:
    enabled: false
    class_distribution_multi: [0.3, 0.3, 0.3]
    class_distribution_binary: [0.5, 0.5]
    test_original: true

  train:
    ratio: 0.6
    use_batches: false
    neighbor_loader_nodes: 30
    neighbor_loader_iterations: 3
    neighbor_loader_batch_size: 128

  val:
    ratio: 0.2
    use_batches: false
    neighbor_loader_nodes: 30
    neighbor_loader_iterations: 3
    neighbor_loader_batch_size: 512

  test:
    ratio: 0.2
    use_batches: false
    neighbor_loader_nodes: 30
    neighbor_loader_iterations: 3
    neighbor_loader_batch_size: 512
    test_change: false

imputation:
  enabled: true
  node_types:
    startup:
      numerical_method: "zero"
      categorical_method: "most_frequent"
      categorical_columns: []
    default:
      numerical_method: median
      categorical_method: most_frequent
      categorical_columns: []

xgboost:
  enabled: false
  use_gnn_embeddings: true # If true, loads embeddings from previous GNN run or uses freshly trained ones
  embedding_path: "outputs/gnn_embeddings.pt" # Path to save/load embeddings
  params:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
