seed: 42

paths:
  graph_dir: data/graph
  startup_file: startup_nodes.csv
  embeddings_dir: data/embeddings_csv
  models_dir: outputs/pipeline_state/models

features:
  whitelist:
    - founded_on_year
    - has_domain
    - has_linkedin_url
    - has_description
    - description_length
    - founder_count
    - total_funding_usd
    - num_funding_rounds
    - total_investors
    - last_funding_on
    - last_funding_stage
    - months_since_last_funding
    - female_count
    - serial_founder_count
    - ivy_league_plus_count
    - bachelor_count
    - master_count
    - phd_count
    - city
  description_embedding_dim: 64

model:
  n_estimators: 200
  max_depth: 3
  learning_rate: 0.05
  subsample: 0.6
  colsample_bytree: 0.6
  gamma: 5
  reg_alpha: 5
  reg_lambda: 10
  min_child_weight: 5
  scale_pos_weight: 7.6
  objective: "binary:logistic"
  tree_method: "hist"

training:
  train_ratio: 0.6
  val_ratio: 0.2
  # test_ratio is 1 - train_ratio - val_ratio = 0.2
  reference_date: "2014-01-01"
  optimize_threshold: true
  threshold_metric: f1
  maturity_gating:
    # Liquidity model only trains on "mature" startups to avoid
    # labelling young unfunded startups as failures.
    age_years: 5            # min age OR...
    min_funding_usd: 1000000  # has raised $1M+ OR...
    min_rounds: 3           # has 3+ funding rounds
