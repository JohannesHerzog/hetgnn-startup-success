seed: 42

paths:
  graph_dir: data/graph
  startup_file: startup_nodes.csv
  embeddings_dir: data/embeddings_csv
  models_dir: outputs/pipeline_state/models

features:
  whitelist:
    # --- original features ---
    - founded_on_year
    - has_domain
    - has_linkedin_url
    - has_description
    - description_length
    - founder_count
    - total_funding_usd
    - num_funding_rounds
    - total_investors
    - last_funding_on
    - last_funding_stage
    - months_since_last_funding
    - female_count
    - serial_founder_count
    - ivy_league_plus_count
    - bachelor_count
    - master_count
    - phd_count
    - city
    # --- additional features ---
    - employee_count
    - num_exits
    - is_sustainable
    - has_email
    - has_phone
    - has_facebook_url
    - has_twitter_url
    - has_logo_url
    - business_degree_count
    - it_degree_count
    - law_degree_count
    - stem_degree_count
    - other_edu_count
    - female_ratio
    - serial_founder_ratio
    - ivy_league_ratio
    - bachelor_ratio
    - master_ratio
    - phd_ratio
    - stem_degree_ratio
    - business_degree_ratio
    - it_degree_ratio
    - has_tech_and_biz
    - top_10_percent_investor_count
    - top_50_percent_investor_count
    - days_until_first_funding
    - accelerator_participation_count
    - avg_days_between_rounds
    - funding_growth_rate
    - implied_monthly_burn
    - has_down_round
    - investor_follow_on_ratio
    - investor_type
    - country_code
    - industry_groups
    - money_angel
    - investors_angel
    - money_pre_seed
    - investors_pre_seed
    - money_seed
    - investors_seed
    - money_series_a
    - investors_series_a
    - money_series_b
    - investors_series_b
    - money_series_c
    - investors_series_c
    - money_series_d
    - investors_series_d
  description_embedding_dim: 64

model:
  n_estimators: 200
  max_depth: 3
  learning_rate: 0.05
  subsample: 0.6
  colsample_bytree: 0.6
  gamma: 5
  reg_alpha: 5
  reg_lambda: 10
  min_child_weight: 5
  scale_pos_weight: 7.6
  objective: "binary:logistic"
  tree_method: "hist"

training:
  train_ratio: 0.6
  val_ratio: 0.2
  # test_ratio is 1 - train_ratio - val_ratio = 0.2
  reference_date: "2014-01-01"
  optimize_threshold: true
  threshold_metric: min_recall
  threshold_recall_target: 0.85
  maturity_gating:
    # Liquidity model only trains on "mature" startups to avoid
    # labelling young unfunded startups as failures.
    age_years: 5            # min age OR...
    min_funding_usd: 1000000  # has raised $1M+ OR...
    min_rounds: 3           # has 3+ funding rounds
